<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Real-Time Dashboard</title>
    <link rel="icon" href="data:,">
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body.light {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #1a1a1a;
        }

        body.dark {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        body.light header {
            background: rgba(255, 255, 255, 0.9);
        }

        body.dark header {
            background: rgba(26, 26, 46, 0.9);
        }

        h1 {
            font-size: 2em;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bitcoin-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #f7931a 0%, #f2a900 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 24px;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }

        body.light .connection-status {
            background: rgba(0, 0, 0, 0.05);
        }

        body.dark .connection-status {
            background: rgba(255, 255, 255, 0.05);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #10b981;
        }

        .status-dot.disconnected {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .theme-toggle {
            background: none;
            border: 2px solid;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        body.light .theme-toggle {
            border-color: #667eea;
            color: #667eea;
        }

        body.dark .theme-toggle {
            border-color: #f7931a;
            color: #f7931a;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        body.light .theme-toggle:hover {
            background: #667eea;
            color: white;
        }

        body.dark .theme-toggle:hover {
            background: #f7931a;
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        body.light .stat-card {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body.dark .stat-card {
            background: rgba(26, 26, 46, 0.9);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        body.light .stat-card:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        body.dark .stat-card:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .stat-label {
            font-size: 0.85em;
            opacity: 0.7;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            transition: color 0.3s;
        }

        .price-change {
            font-size: 0.9em;
            margin-top: 8px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .price-up {
            color: #10b981;
        }

        .price-down {
            color: #ef4444;
        }

        .chart-container {
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        body.light .chart-container {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body.dark .chart-container {
            background: rgba(26, 26, 46, 0.9);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        #tradingview-widget {
            height: 600px;
        }

        .sparkline-container {
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        body.light .sparkline-container {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body.dark .sparkline-container {
            background: rgba(26, 26, 46, 0.9);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        #sparkline {
            height: 150px;
            margin-top: 10px;
        }

        .flash {
            animation: flash 0.5s;
        }

        @keyframes flash {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            #tradingview-widget {
                height: 400px;
            }
        }
    </style>
</head>

<body class="dark">
    <div class="container">
        <header>
            <h1>
                <span class="bitcoin-icon">₿</span>
                Bitcoin Dashboard
            </h1>
            <div class="controls">
                <div class="connection-status">
                    <span class="status-dot disconnected" id="statusDot"></span>
                    <span id="statusText">Connecting...</span>
                </div>
                <button class="theme-toggle" id="themeToggle">
                    <span id="themeIcon">🌙</span>
                    <span id="themeText">Dark</span>
                </button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">BTC Price (USDT)</div>
                <div class="stat-value" id="lastPrice">--</div>
                <div class="price-change" id="priceChange">
                    <span>--</span>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Mark Price</div>
                <div class="stat-value" id="markPrice">--</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">24h High</div>
                <div class="stat-value price-up" id="high24h">--</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">24h Low</div>
                <div class="stat-value price-down" id="low24h">--</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">24h Volume (USDT)</div>
                <div class="stat-value" id="volume24h">--</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">24h Change</div>
                <div class="stat-value" id="change24h">--</div>
            </div>
        </div>

        <div class="chart-container">
            <div id="tradingview-widget"></div>
        </div>

        <div class="sparkline-container">
            <div class="stat-label">Last 60s Price Movement</div>
            <div id="sparkline"></div>
        </div>
    </div>

    <script>
        // Theme Management
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        const body = document.body;

        let currentTheme = 'dark';

        themeToggle.addEventListener('click', () => {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.className = currentTheme;
            themeIcon.textContent = currentTheme === 'dark' ? '🌙' : '☀️';
            themeText.textContent = currentTheme === 'dark' ? 'Dark' : 'Light';

            // Update TradingView widget
            loadTradingViewWidget();

            // Update sparkline chart
            updateSparklineTheme();
        });

        // WebSocket Management
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        let lastPrice = null;
        const priceHistory = [];
        const maxHistoryLength = 60;

        function connectWebSocket() {
            try {
                ws = new WebSocket('wss://stream.bybit.com/v5/public/linear');

                ws.onopen = () => {
                    console.log('WebSocket connected');
                    reconnectAttempts = 0;
                    updateConnectionStatus(true);

                    // Subscribe to BTC/USDT ticker
                    const subscribeMsg = {
                        op: 'subscribe',
                        args: ['tickers.BTCUSDT']
                    };
                    ws.send(JSON.stringify(subscribeMsg));
                };

                console.log("WebSocket connection initiated", ws);

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);

                    if (data.topic === 'tickers.BTCUSDT' && data.data) {
                        updateDashboard(data.data);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateConnectionStatus(false);
                };

                ws.onclose = () => {
                    console.log('WebSocket disconnected');
                    updateConnectionStatus(false);

                    // Attempt to reconnect
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        console.log(`Reconnecting... Attempt ${reconnectAttempts}`);
                        setTimeout(connectWebSocket, 3000);
                    }
                };
            } catch (error) {
                console.error('Failed to connect:', error);
                updateConnectionStatus(false);
            }
        }

        function updateConnectionStatus(connected) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            if (connected) {
                statusDot.className = 'status-dot connected';
                statusText.textContent = 'Connected';
            } else {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = 'Disconnected';
            }
        }

        function updateDashboard(data) {

            if (data.lastPrice) lastPrice = parseFloat(data.lastPrice);
            if (data.markPrice) lastMarkPrice = parseFloat(data.markPrice);
            if (data.highPrice24h) lastHigh = parseFloat(data.highPrice24h);
            if (data.lowPrice24h) lastLow = parseFloat(data.lowPrice24h);
            if (data.turnover24h) lastVolume = parseFloat(data.turnover24h);
            if (data.price24hPcnt) lastChange = parseFloat(data.price24hPcnt);

            document.getElementById("lastPrice").textContent =
                `$${lastPrice.toLocaleString("en-US", { minimumFractionDigits: 2 })}`;

            document.getElementById("markPrice").textContent =
                `$${lastMarkPrice.toLocaleString("en-US", { minimumFractionDigits: 2 })}`;

            document.getElementById("high24h").textContent =
                `$${lastHigh.toLocaleString("en-US", { minimumFractionDigits: 2 })}`;

            document.getElementById("low24h").textContent =
                `$${lastLow.toLocaleString("en-US", { minimumFractionDigits: 2 })}`;

            document.getElementById("volume24h").textContent =
                lastVolume >= 1e9
                    ? `$${(lastVolume / 1e9).toFixed(2)}B`
                    : `$${(lastVolume / 1e6).toFixed(2)}M`;

            const changePercent = lastChange * 100;

            document.getElementById("change24h").textContent =
                `${changePercent >= 0 ? "+" : ""}${changePercent.toFixed(2)}%`;

            updateSparkline(lastPrice);
        }

        // Sparkline Chart
        let sparklineChart = null;
        let sparklineSeries = null;

        function initSparkline() {
            const chartContainer = document.getElementById('sparkline');

            sparklineChart = LightweightCharts.createChart(chartContainer, {
                width: chartContainer.clientWidth,
                height: 150,
                layout: {
                    background: { color: 'transparent' },
                    textColor: currentTheme === 'dark' ? '#e0e0e0' : '#1a1a1a',
                },
                grid: {
                    vertLines: { color: 'rgba(197, 203, 206, 0.1)' },
                    horzLines: { color: 'rgba(197, 203, 206, 0.1)' },
                },
                rightPriceScale: {
                    borderVisible: false,
                },
                timeScale: {
                    borderVisible: false,
                    timeVisible: true,
                    secondsVisible: true,
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
            });

            sparklineSeries = sparklineChart.addLineSeries({
                color: '#f7931a',
                lineWidth: 2,
                priceLineVisible: false,
            });

            sparklineSeries.setData([]);

            // Responsive
            window.addEventListener('resize', () => {
                sparklineChart.applyOptions({ width: chartContainer.clientWidth });
            });
        }

        function updateSparkline(price) {
            if (!sparklineSeries || !price) return;

            const timestamp = Math.floor(Date.now() / 1000);

            const dataPoint = {
                time: timestamp,
                value: Number(price)
            };

            priceHistory.push(dataPoint);

            if (priceHistory.length > maxHistoryLength) {
                priceHistory.shift();
            }

            sparklineSeries.update(dataPoint);
        }

        function updateSparklineTheme() {
            if (sparklineChart) {
                sparklineChart.applyOptions({
                    layout: {
                        background: { color: 'transparent' },
                        textColor: currentTheme === 'dark' ? '#e0e0e0' : '#1a1a1a',
                    },
                });
            }
        }

        // TradingView Widget
        function loadTradingViewWidget() {
            const container = document.getElementById('tradingview-widget');
            container.innerHTML = '';

            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
            script.async = true;
            script.innerHTML = JSON.stringify({
                autosize: true,
                symbol: 'BYBIT:BTCUSDT',
                interval: '5',
                timezone: 'Etc/UTC',
                theme: currentTheme,
                style: '1',
                locale: 'en',
                enable_publishing: false,
                hide_top_toolbar: false,
                hide_legend: false,
                save_image: false,
                container_id: 'tradingview-widget',
                backgroundColor: currentTheme === 'dark' ? 'rgba(26, 26, 46, 1)' : 'rgba(255, 255, 255, 1)',
                gridColor: currentTheme === 'dark' ? 'rgba(255, 255, 255, 0.06)' : 'rgba(0, 0, 0, 0.06)',
                support_host: 'https://www.tradingview.com'
            });

            container.appendChild(script);
        }

        // Initialize
        window.addEventListener('load', () => {
            connectWebSocket();
            loadTradingViewWidget();
            initSparkline();
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>

</html>
